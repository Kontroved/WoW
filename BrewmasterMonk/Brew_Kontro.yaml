version: 3.0
author: Kontroved
spec: 268
name: BrewMonk by Kontro
description: Brewmaster Monk Rotation by Kontroved

entry: main

config:
  dps_mode:
    type: toggle
    label: "DPS Mode"
    description: "Use CI less"
    spell: 115181
  spam_purifying_brew:
    type: toggle
    label: "spam Puryfying Brew"
    spell: 119582
    description: "Spam Purifying Brew at set %"
  features:
    label: "Features"
    type: multi_select
    options:
      - label: "Taunt Usage (Provoke)"
        value: 2
      - label: "Auto Freedom"
        value: 3
      - label: "Fort brew DPS Usage (not recommended)"
        value: 5
    default: [2,3]
    show_override: true
  # Defensive Settings
  celestial_hp_pct:
    label: "Celestial Brew/Infusion HP %"
    type: slider
    min: 0
    max: 100
    default: 100
    show_override: true
  expel_harm_pct:
    label: "Expel Harm HP %"
    type: slider
    min: 0
    max: 100
    default: 35
    show_override: true
  fortifying_brew_pct:
    label: "Fortifying Brew HP % (recommend manual usage)"
    type: slider
    min: 0
    max: 100
    default: 20
    show_override: true
  purifying_brew_pct:
    label: "Purifying Brew Stagger %"
    type: slider
    min: 0
    max: 200
    default: 130
    show_override: true
  purifying_brew_spam_pct:
    label: "SPAM Purifying Brew Stagger %"
    type: slider
    min: 0
    max: 200
    default: 1
    show_override: true
  # ttd_cd_usage:
  #   label: "TTD CD Usage Threshold"
  #   type: slider
  #   min: 0
  #   max: 30
  #   default: 10
  #   show_override: true
variables:
    opener_usage: config.features.has(0)
    precombat_usage: config.features.has(1)
    taunt_usage: config.features.has(2)
    tigers_lust_usage: config.features.has(4)
    celestial_brew_pct: config.celestial_hp_pct
    expel_harm_pct: config.expel_harm_pct
    fortifying_brew_pct: config.fortifying_brew_pct
    purifying_brew_pct: config.purifying_brew_pct
    purifying_brew_spam_pct: config.purifying_brew_spam_pct
    light_stagger: stagger.pct<29
    moderate_stagger: stagger.pct>=30&stagger.pct<60
    heavy_stagger: stagger.pct>=80
    auto_swap: config.features.has(3)
    apex_rank: talent.bring_me_another.rank
    # Master of Harmony (Aspect of Harmony) auras by spell id
    aspect_of_harmony_driver: buff.450567.up
    aspect_of_harmony_accumulator: buff.450521.up
    aspect_of_harmony_spender: buff.450711.up
    aspect_of_harmony_damage: buff.450763.up
    aspect_of_harmony_heal: buff.450769.up
    defensives_up: buff.celestial_infusion.up|buff.fortifying_brew.up|stagger.pct<100
    spam_purifying_brew: config.spam_purifying_brew
    dps_mode: config.dps_mode
lists:
  combat_checks:
    - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
    - return,if=!target.valid&config.auto_combat.has(0)

  defensives:
    - purifying_brew,delay=500,if=(stagger.pct>var.purifying_brew_pct|stagger.pct>1&cooldown.purifying_brew.charges_fractional=2)&!buff.empty_barrel.up
    - purifying_brew,delay=500,if=stagger.pct>var.purifying_brew_spam_pct&!buff.empty_barrel.up&var.spam_purifying_brew&cooldown.purifying_brew.charges_fractional>1.4
    - celestial_brew,,if=health.pct<=var.celestial_hp_pct&!buff.empty_barrel.up&cooldown.keg_smash.charges_fractional<1.2
    - celestial_infusion,if=health.pct<=config.celestial_hp_pct&!buff.empty_barrel.up&!buff.celestial_infusion.up&cooldown.keg_smash.charges_fractional<1.2&!var.dps_mode
    - celestial_infusion,if=incoming_cast.tank.up&!var.defensives_up
    - fortifying_brew,if=incoming_cast.tank.up&!var.defensives_up&cooldown.celestial_infusion.remains>gcd
    - fortifying_brew,name="Fortifying Brew",if=(health.pct<=var.fortifying_brew_pct|stagger.pct>=120)&!buff.invoke_niuzao_the_black_ox.up

  self_heals: 
    - expel_harm,name="Expel Harm (Config HP)",if=health.pct<=var.expel_harm_pct

  interrupts:
    - spear_hand_strike,if=interrupt.target.check
    #- spear_hand_strike,if=interrupt.target.check|(incoming_cast.5y.kickable.count>=1&incoming_cast.5y.kickable.remains<=0.2)
    - spear_hand_strike.mouseover,if=interrupt.mouseover.check
    - spear_hand_strike.focus,if=interrupt.focus.check

    - paralysis,name="Paralysis Target (CC)",if=interrupts.target.stun.ready
    - paralysis,name="Paralysis CC",if=interrupt.cc.check&!(cooldown.spear_hand_strike.ready&interrupts.target.check)
    - paralysis.mouseover,name="Paralysis Mouseover (CC)",if=interrupts.mouseover.cc.ready
    - paralysis.mouseover,name="Paralysis Mouseover (CC)",if=interrupts.mouseover.stun.ready
    - leg_sweep,name="Leg Sweep (AoE)",if=interrupt.stun.aoe.check
        # Racial
    - quaking_palm,if=interrupt.cc.check
    - haymaker,if=interrupt.cc.check
    - war_stomp,if=interrupt.stun.aoe.check
    - bull_rush,if=interrupt.stun.aoe.check
    - tail_swipe,if=interrupt.stun.aoe.check

  taunt:
    - provoke,name="Taunt",if=target.threat<2&target.combat&target.threat!=-1&!player.inraid
    - provoke.mouseover,name="Taunt MO",if=mouseover.threat<2&mouseover.combat&mouseover.threat!=-1&mouseover.exists&!player.inraid
  
  trinkets:
    - trinket_1,if=trinket_1.sync
    - trinket_2,if=trinket_2.sync
  APL:
    - touch_of_death,name="Touch of Death (Prio 1)"
    - breath_of_fire,range_check=none,if=prev_gcd.1.keg_smash|prev_gcd.2.keg_smash
    - blackout_kick,if=active.enemies>=3
    - keg_smash,name="Keg Smash (Prio 2)",if=cooldown.keg_smash.charges=2
    - blackout_kick,if=active.enemis<3
    - black_ox_brew,name="Black Ox Brew (Prio 3)",if=talent.aspect_of_harmony&(cooldown.celestial_brew.charges_fractional<1|cooldown.celestial_infusion.charges_fractional<1)
    - black_ox_brew,name="Black Ox Brew (Prio 4)",if=!talent.aspect_of_harmony&(energy<40&cooldown.celestial_infusion.down)
    - celestial_brew,name="Celestial Brew (Prio 5)",if=cooldown.celestial_brew.charges_fractional>1.8&!buff.empty_barrel.up&!buff.celestial_brew.up&!buff.fortifying_brew.up
    - celestial_infusion,name="Celestial Infusion (Prio 6)",if=cooldown.celestial_infusion.charges_fractional>1.8&!buff.empty_barrel.up&!buff.celestial_infusion.up&!buff.fortifying_brew.up
    - celestial_brew,name="Celestial Brew (Prio 7)",if=buff.450711.up&!buff.empty_barrel.up
    - celestial_infusion,name="Celestial Infusion (Prio 8)",if=buff.450711.up&!buff.empty_barrel.up
    - keg_smash,name="Keg Smash (Prio 9)",if=buff.450711.up&buff.empty_barrel.up
    - breath_of_fire,name="Breath of Fire (Prio 10)",if=talent.wisdom_of_the_wall&buff.invoke_niuzao_the_black_ox.up
    - keg_smash,name="Keg Smash (Prio 11)",if=talent.wisdom_of_the_wall&buff.invoke_niuzao_the_black_ox.up
    - blackout_kick,name="Blackout Kick (Prio 12)",if=talent.blackout_combo&!buff.blackout_combo.up
    - celestial_brew,name="Celestial Brew (Prio 13)",if=!(var.apex_rank=4&buff.empty_barrel.up)&buff.aspect_of_harmony.icon=5041790
    - celestial_brew,name="Celestial Brew (Prio 14)",if=!(var.apex_rank=4&buff.empty_barrel.up)&target.time_to_die<15&(buff.aspect_of_harmony.icon=5041800||buff.aspect_of_harmony.icon=5041790)
    - celestial_infusion,name="Celestial Infusion (Prio 15)",if=!(var.apex_rank=4&buff.empty_barrel.up)&buff.aspect_of_harmony.icon=5041790
    - celestial_infusion,name="Celestial Infusion (Prio 16)",if=!(var.apex_rank=4&buff.empty_barrel.up)&target.time_to_die<15&(buff.aspect_of_harmony.icon=5041800||buff.aspect_of_harmony.icon=5041790)
    - fortifying_brew,name="Fortifying Brew (Prio 18)",if=!(var.apex_rank=4&buff.empty_barrel.up)&!buff.celestial_infusion.up&config.features.has(5)
    - chi_burst,name="Chi Burst (Prio 19)",if=player.standing.time>2
    - invoke_niuzao_the_black_ox,name="Invoke Niuzao the Black Ox (Prio 23)"
    - tiger_palm,if=buff.blackout_combo.up&cooldown.blackout_kick.remains<1.3
    - exploding_keg.player,name="Exploding Keg (Prio 20)",if=cooldown.keg_smash.charges_fractional<1
    - empty_the_cellar,name="Empty the Cellar (Prio 21)",if=talent.aspect_of_harmony&(cooldown.celestial_brew.remains>15|cooldown.celestial_infusion.remains>15)
    - empty_the_cellar,name="Empty the Cellar (Prio 22)",if=!talent.aspect_of_harmony&(buff.empty_the_cellar.remains<1.5)
    - breath_of_fire,name="Breath of Fire (Prio 24)",if=cooldown.blackout_kick.remains>1.5&!buff.empty_barrel.up&cooldown.keg_smash.charges<1+talent.stormstouts_last_keg
    - tiger_palm,name="Tiger Palm (Prio 25)",if=buff.blackout_combo.up
    - celestial_brew,name="Celestial Brew (Prio 26)",if=talent.flurry_strikes&!(var.apex_rank=4&buff.empty_barrel.up)
    - celestial_infusion,name="Celestial Infusion (Prio 27)",if=talent.flurry_strikes&!(var.apex_rank=4&buff.empty_barrel.up)
    - breath_of_fire,name="Breath of Fire (Prio 28)",if=talent.flurry_strikes
    - keg_smash,name="Keg Smash (Prio 28)",if=talent.flurry_strikes
    - keg_smash,name="Keg Smash (Prio 29)",if=talent.scalding_brew
    - keg_smash,name="Keg Smash (Prio 30)",if=buff.empty_barrel.up
    - keg_smash,name="Keg Smash (Prio 31)",if=cooldown.keg_smash.charges=1+talent.stormstouts_last_keg
    - breath_of_fire,name="Breath of Fire (Prio 32)"
    - empty_the_cellar,name="Empty the Cellar (Prio 33)"
    - rushing_jade_wind,name="Rushing Jade Wind (Prio 34)"
    - keg_smash,name="Keg Smash (Prio 35)"
    - blackout_kick,name="Blackout Kick (Prio 36)"
    - tiger_palm,name="Tiger Palm (Prio 37)",if=talent.aspect_of_harmony&energy>50
    - tiger_palm,name="Tiger Palm (Prio 38)",if=energy>65&cooldown.blackout_kick.remains>gcd.remains
    #- expel_harm,name="Expel Harm (Prio 39)",if=energy>30

  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_heal
    - call_action_list,name=auto_target
      # user combat
    - return,if=auto_combat.player
    - call_action_list,name=interrupts
    - call_action_list,name=auto_dispel
    - call_action_list,name=defensives
    - call_action_list,name=self_heals
    - call_action_list,name=auto_freedom&config.features.has(3)
        # target combat
    - return,if=!target.alive
    - call_action_list,name=auto_purge_enrage
    - call_action_list,name=taunt
    - combat_potion, if=(buff.algethar_puzzle.up|buff.invoke_niuzao_the_black_ox.up)&combat_potion.ready
    - call_action_list,name=APL
